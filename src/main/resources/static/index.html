<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>GeoClimate</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

  <h1>🌍 GeoClimate</h1>

  <p class="subtitle">
    Consulte endereço e clima em tempo real usando o CEP
  </p>

  <div class="search-box">

    <input
            type="text"
            id="cepInput"
            placeholder="Digite o CEP (ex: 01001000)"
            maxlength="8"
    />

    <button onclick="buscarCep()">
      Buscar
    </button>

    <button onclick="carregarHistorico()">
      📜 Ver Histórico
    </button>

  </div>

  <button onclick="usarLocalizacao()" class="btn-localizacao">
    📍 Usar minha localização
  </button>

  <div id="loader" class="loader hidden"></div>

  <div id="resultado" class="result hidden">

    <h2 id="cidade"></h2>

    <p class="address">
      <span id="rua"></span><br>
      <span id="bairro"></span>
    </p>

    <div class="clima">

      <p>
        🌡️ <span id="temperatura"></span> °C
      </p>

      <p>
        <img id="iconeClima" width="40">
        <span id="descricao"></span>
      </p>

      <p>
        💧 Umidade: <span id="umidade"></span>%
      </p>

    </div>

  </div>

  <p id="erro" class="error hidden"></p>

  <h2>
    📊 Histórico de Consultas
    (<span id="contador">0</span>)
  </h2>

  <table class="historico-table">

    <thead>
    <tr>
      <th>CEP</th>
      <th>Cidade</th>
      <th>Estado</th>
    </tr>
    </thead>

    <tbody id="historico"></tbody>

  </table>

  <button onclick="limparHistorico()" class="btn-limpar">
    🗑 Limpar Histórico
  </button>

</div>

<script src="/js/script.js"></script>

</body>
</html>
